openapi: 3.0.0

info:
  title: Career OS API
  version: 1.0.0
  description: Career OS Backend API Documentation

servers:
  - url: http://localhost:5000

paths:
  /:
    get:
      summary: Home API
      responses:
        '200':
          description: Success

  /api/auth/register:
    post:
      summary: Register User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User Registered